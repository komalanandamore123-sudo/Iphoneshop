<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        header p {
            margin-top: 10px;
            font-weight: 300;
            color: #ccc;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            transition: 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #00ffcc;
        }

        .btn {
            display: inline-block;
            padding: 10px 25px;
            background: #00ffcc;
            color: #000;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

<header>
    <h1>Premium iPhone Store</h1>
    <p>Choose Your Favorite iPhone Model</p>
</header>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1695048133141-1a2043614d00" alt="iPhone 15 Pro Max">
        <h2>iPhone 15 Pro Max</h2>
        <div class="price">$1199</div>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7" alt="iPhone 14 Pro">
        <h2>iPhone 14 Pro</h2>
        <div class="price">$999</div>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505" alt="iPhone 13">
        <h2>iPhone 13</h2>
        <div class="price">$699</div>
        <a href="#" class="btn">Buy Now</a>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97" alt="iPhone 12">
        <h2>iPhone 12</h2>
        <div class="price">$599</div>
        <a href="#" class="btn">Buy Now</a>
    </div>

</div>

<footer>
    © 2026 iPhone Store | Designed with ❤
</footer>

</body>
</html>
